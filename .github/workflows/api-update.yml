name: Automated API Version Updater

on:
  schedule:
    - cron: '0 4 * * *' # Run daily at 4:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  check-api-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for new Space Devs API version
        id: check_version
        run: |
          LATEST_VERSION=$(curl -s https://ll.thespacedevs.com/docs/ | grep -oP 'url: "/\K[0-9]+\.[0-9]+\.[0-9]+(?=/json")')
          CURRENT_VERSION=$(grep -oP 'thespacedevs\.com/\K[0-9]+\.[0-9]+\.[0-9]+' src/widget.html)

          if [ -z "$LATEST_VERSION" ]; then
            echo "Could not fetch latest version from thespacedevs.com"
            exit 1
          fi

          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "New API version found: $LATEST_VERSION (Current: $CURRENT_VERSION)"
            echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
            echo "UPDATE_FOUND=true" >> $GITHUB_ENV

            # Update the API URL inside src/widget.html
            sed -i "s/$CURRENT_VERSION/$LATEST_VERSION/g" src/widget.html
          else
            echo "API version $CURRENT_VERSION is up to date."
            echo "UPDATE_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Setup Python
        if: env.UPDATE_FOUND == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Build the widget
        if: env.UPDATE_FOUND == 'true'
        run: python3 build.py

      - name: Create Pull Request
        if: env.UPDATE_FOUND == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: 'chore: update The Space Devs API to v${{ env.LATEST_VERSION }}'
          title: 'Update The Space Devs API to v${{ env.LATEST_VERSION }}'
          body: |
            Automatically generated PR to update The Space Devs API from version in source to the newly released **v${{ env.LATEST_VERSION }}**.

            The `build.py` script has been run to update `dist/widget.min.html` and `index.html`.
          branch: chore/update-space-devs-api
          base: main
