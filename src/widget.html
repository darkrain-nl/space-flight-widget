<div id="space-countdown-widget" style="font-family: 'Inter', system-ui, sans-serif; background: rgba(15, 17, 26, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 1.5rem; color: white; max-width: 350px; width: 100%; text-align: center; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); box-sizing: border-box; margin: auto;">
    <div id="space-title" style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.8rem; font-weight: 600;">Laden...</div>
    <div id="space-name" style="font-weight: 700; font-size: 1.1rem; margin-bottom: 1.2rem; line-height: 1.3; background: linear-gradient(to right, #fff, #a5b4fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">--</div>

    <div id="space-timer" style="display: none; justify-content: center; gap: 12px; margin-bottom: 1rem;">
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 8px; min-width: 50px;">
            <span id="space-d" style="font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px;">00</span>
            <span style="font-size: 0.65rem; color: #94a3b8; letter-spacing: 0.5px;">DAGEN</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 8px; min-width: 50px;">
            <span id="space-h" style="font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px;">00</span>
            <span style="font-size: 0.65rem; color: #94a3b8; letter-spacing: 0.5px;">UUR</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 8px; min-width: 50px;">
            <span id="space-m" style="font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px;">00</span>
            <span style="font-size: 0.65rem; color: #94a3b8; letter-spacing: 0.5px;">MIN</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 8px; min-width: 50px;">
            <span id="space-s" style="font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px;">00</span>
            <span style="font-size: 0.65rem; color: #94a3b8; letter-spacing: 0.5px;">SEC</span>
        </div>
    </div>

    <div id="space-status" style="display: none; font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3);">--</div>

    <div id="space-attribution" style="margin-top: 1.5rem; font-size: 0.65rem;">
        <a href="https://thespacedevs.com/" target="_blank" rel="noopener noreferrer" style="color: #94a3b8; text-decoration: none;">Gegevens via The Space Devs</a>
    </div>

    <script>
        (function () {
            var API_URL = 'https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=50';
            var HEAVY = ['starship', 'super heavy', 'falcon heavy', 'sls', 'vulcan', 'new glenn', 'ariane 6', 'long march 5'];

            var titleEl = document.getElementById('space-title');
            var nameEl = document.getElementById('space-name');
            var statusEl = document.getElementById('space-status');
            var timerEl = document.getElementById('space-timer');
            var dEl = document.getElementById('space-d');
            var hEl = document.getElementById('space-h');
            var mEl = document.getElementById('space-m');
            var sEl = document.getElementById('space-s');

            var targetDate;
            var timerInterval;

            function fetchLaunch() {
                fetch(API_URL)
                    .then(function(res) {
                        if (!res.ok) throw new Error('API error');
                        return res.json();
                    } )
                    .then(function(data) {
                        var launch = null;
                        for (var i = 0; i < data.results.length; i++) {
                            var l = data.results[i];
                            var r = '';
                            var f = '';
                            if (l.rocket && l.rocket.configuration) {
                                r = (l.rocket.configuration.name || '').toLowerCase();
                                f = (l.rocket.configuration.family || '').toLowerCase();
                            }
                            
                            var isHeavy = false;
                            for (var j = 0; j < HEAVY.length; j++) {
                                if (r.indexOf(HEAVY[j]) !== -1 || f.indexOf(HEAVY[j]) !== -1) {
                                    isHeavy = true;
                                    break;
                                }
                            }
                            
                            var launchTime = new Date(l.net).getTime();
                            var now = new Date().getTime();
                            var daysAway = (launchTime - now) / (1000 * 60 * 60 * 24);
                            
                            var isFuture = launchTime > now;
                            var isSoon = daysAway <= 7;
                            
                            if (isHeavy && isFuture && isSoon) {
                                launch = l;
                                break;
                            }
                        }

                        if (launch) {
                            titleEl.innerHTML = "Aankomende Lancering";
                            nameEl.innerHTML = launch.name;
                            var statusMap = {
                                'Go for Launch': 'Klaar voor Lancering',
                                'To Be Determined': 'Nog te bepalen',
                                'Launch Successful': 'Lancering Succesvol',
                                'TBC': 'Nog te bevestigen',
                                'In Flight': 'In de Vlucht'
                            };
                            
                            var rawStatus = (launch.status && launch.status.name) ? launch.status.name : '';
                            statusEl.innerHTML = statusMap[rawStatus] || rawStatus || 'Onbekende Status';

                            var statusName = rawStatus.toLowerCase();
                            if (statusName.indexOf('go') === -1 && statusName.indexOf('success') === -1) {
                                statusEl.style.background = 'rgba(245, 158, 11, 0.15)';
                                statusEl.style.color = '#fbbf24';
                                statusEl.style.borderColor = 'rgba(245, 158, 11, 0.3)';
                            }

                            targetDate = new Date(launch.net).getTime();
                            timerEl.style.display = 'flex';
                            statusEl.style.display = 'inline-block';

                            updateTimer();
                            timerInterval = setInterval(updateTimer, 1000);
                        } else {
                            titleEl.innerHTML = "Geen Lancering Gepland";
                            nameEl.innerHTML = "Kijk later nog eens";
                            timerEl.style.display = 'none';
                            statusEl.style.display = 'none';
                        }
                    } )
                    .catch(function(e) {
                        titleEl.innerHTML = "Fout bij laden van gegevens";
                        nameEl.innerHTML = "Probeer het later opnieuw";
                    } );
            }

            function updateTimer() {
                var dist = targetDate - new Date().getTime();
                if (dist < 0) {
                    clearInterval(timerInterval);
                    return;
                }
                var d = Math.floor(dist / 86400000);
                var h = Math.floor((dist % 86400000) / 3600000);
                var m = Math.floor((dist % 3600000) / 60000);
                var s = Math.floor((dist % 60000) / 1000);
                
                dEl.innerHTML = (d < 10 ? '0' : '') + d;
                hEl.innerHTML = (h < 10 ? '0' : '') + h;
                mEl.innerHTML = (m < 10 ? '0' : '') + m;
                sEl.innerHTML = (s < 10 ? '0' : '') + s;
            }

            fetchLaunch();
        } )();
    </script>
</div>
