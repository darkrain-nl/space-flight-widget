                var currentUse = (throttle && throttle.current_use) || 0;
                var remaining = limit - currentUse;

                var now = new Date().getTime();
                var launchTime = new Date(launch.net).getTime();
                var precisionId = (launch.net_precision && launch.net_precision.id) || 5;

                /* If we are throttled, wait for next reset */
                if (throttle && throttle.next_use_secs > 0) {
                    return (throttle.next_use_secs + 5) * 1000;
                }

                /* If launch time has passed, cache is stale immediately */
                if (now >= launchTime) {
                    return 0;
                }

                var msAway = launchTime - now;
                var hoursAway = msAway / 3600000;
                var isPrecise = (precisionId <= 6);

                /* Category 1: Healthy Quota (more than 3 requests left) */
                if (remaining > 3) {
                    if (isPrecise) {
                        if (msAway < 300000) return 120000;     /* 2 mins if < 5 mins away */
                        if (hoursAway < 1) return 300000;       /* 5 mins if < 1 hour away */
                        if (hoursAway < 6) return 600000;       /* 10 mins if < 6 hours away */
                        if (hoursAway < 24) return 900000;      /* 15 mins if < 24 hours away */
                    } else {
                        if (hoursAway < 24) return 900000;      /* 15 mins for coarse launches */
                    }
                    return 1800000; /* 30 mins default */
                }

                /* Category 2: Conserving Quota (1 to 3 requests left) */
                if (remaining >= 1) {
                    if (isPrecise) {
                        if (hoursAway < 0.5) return 300000;     /* 5 mins (critical window) */
                        if (hoursAway < 2) return 600000;       /* 10 mins */
                        if (hoursAway < 12) return 1200000;     /* 20 mins */
                    }
                    return 1800000; /* 30 mins default */
                }

                /* Category 3: Quota Depleted */
                return 600000; /* 10 mins */
            }

            /* Read the structured cache from localStorage */
            function readCache() {
                try {
                    var raw = localStorage.getItem(CACHE_KEY);
                    if (!raw) return null;
                    var parsed = JSON.parse(raw);
                    if (parsed && parsed.results && !parsed.data) {
                        return { data: parsed, ts: 0, throttle: null };
                    }
                    if (parsed && parsed.data) {
                        return parsed;
                    }
                } catch (e) {}
                return null;
            }

            /* Write structured cache to localStorage */
            function writeCache(data, throttle) {
                try {
                    var existing = readCache();
                    var cacheObj = {
                        data: data,
                        ts: new Date().getTime(),
                        throttle: (throttle !== undefined && throttle !== null) ? throttle : (existing ? existing.throttle : null)
                    };
                    localStorage.setItem(CACHE_KEY, JSON.stringify(cacheObj) );
                } catch (e) {}
            }

            function formatCoarseDate(netStr, precisionId) {
                var date = new Date(netStr);
                var year = date.getUTCFullYear();
                var monthNames = {
                    en: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                    fr: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Août', 'Sep', 'Oct', 'Nov', 'Déc'],
                    it: ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'],
                    de: ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'],
                    es: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
                    nl: ['Jan', 'Feb', 'Mrt', 'Apr', 'Mei', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dec']
                };
                var months = monthNames[langCode] || monthNames['en'];
                var monthIndex = date.getUTCMonth();
                
                if (precisionId === 7) {
                    return months[monthIndex] + ' ' + year;
                }
                if (precisionId === 7 + 1) {
                    return 'Decade of ' + year;
                }
                if (precisionId === 9 || precisionId === 10 || precisionId === 11) {
                    var quarter = Math.floor(monthIndex / 3) + 1;
                    return 'Q' + quarter + ' ' + year;
                }
                if (precisionId === 12 || precisionId === 15) {
                    var half = monthIndex < 6 ? 'H1' : 'H2';
                    return half + ' ' + year;
                }
                return String(year);
            }

            function fetchLaunch(force) {
                if (isFetching) {
                    return;
                }
                isFetching = true;
                updateMetaInfo();

                if (window.spaceWidgetTimerInterval) {
                    clearInterval(window.spaceWidgetTimerInterval);
                }
                if (window.spaceWidgetFetchTimeout) {
                    clearTimeout(window.spaceWidgetFetchTimeout);
                }

                fetch(THROTTLE_URL, { cache: 'no-store' } )
                    .then(function(res) {
                        if (!res.ok) throw new Error('Throttle API failed');
                        return res.json();
                    } )
                    .then(function(throttleData) {
                        var cache = readCache();
                        var throttleObj = throttleData;
                        window.spaceWidgetCurrentThrottle = throttleObj;
                        
                        if (cache) {
                            cache.throttle = throttleObj;
                            try {
                                localStorage.setItem(CACHE_KEY, JSON.stringify(cache) );
                            } catch (e) {}
                        }
                        
                        var limit = throttleObj.your_request_limit || 15;
                        var currentUse = throttleObj.current_use || 0;
                        
                        if (currentUse >= limit) {
                            if (cache && cache.data) {
                                renderData(cache.data);
                            } else {
                                titleEl.textContent = t.errorLoad;
                                nameEl.textContent = t.errorRateLimit;
                                nameEl.removeAttribute('href');
                                providerPadEl.style.display = 'none';
                                avatarEl.style.display = 'none';
                                timerEl.style.display = 'none';
                                coarseDateEl.style.display = 'none';
                                statusEl.style.display = 'none';
                                if (refreshBtnEl) {
                                    refreshBtnEl.style.display = 'inline-flex';
                                }
                                warningBoxEl.style.display = 'none';
                            }
                            if (force) {
                                warningBoxEl.textContent = t.errorRateLimit;
                                warningBoxEl.style.display = 'block';
                                setTimeout(function() {
                                    var existing = readCache();
                                    if (existing && existing.data) {
                                        renderData(existing.data);
                                    } else {
                                        warningBoxEl.style.display = 'none';
                                    }
                                }, 5000);
                            }
                            var retryDelay = (throttleObj.next_use_secs > 0) ? (throttleObj.next_use_secs + 5) * 1000 : 300000;
                            window.spaceWidgetNextRefreshTime = new Date().getTime() + retryDelay;
                            window.spaceWidgetFetchTimeout = setTimeout(fetchLaunch, retryDelay);
                            isFetching = false;
                            updateMetaInfo();
                            return;
                        }
                        
                        doFetchLaunch(throttleObj);
                    } )
                    .catch(function() {
                        doFetchLaunch(null);
                    } );
            }

            function doFetchLaunch(throttleObj) {
                fetch(API_URL, { cache: 'no-store' } )
                    .then(function(res) {
                        if (res.status === 429) {
                            return res.json().then(function(errData) {
                                throw { isRateLimit: true, detail: errData.detail };
                            } );
                        }
                        if (!res.ok) throw new Error('API error');
                        return res.json();
                    } )
                    .then(function(data) {
                        writeCache(data, throttleObj);
                        window.spaceWidgetLastFetchTime = new Date().getTime();
                        window.spaceWidgetCurrentThrottle = throttleObj;

                        var matchedLaunch = renderData(data);
                        
                        var cache = readCache();
                        var interval = getDynamicTTL(matchedLaunch, cache ? cache.throttle : throttleObj);
                        window.spaceWidgetNextRefreshTime = new Date().getTime() + interval;
                        
                        if (window.spaceWidgetFetchTimeout) {
                            clearTimeout(window.spaceWidgetFetchTimeout);
                        }
                        window.spaceWidgetFetchTimeout = setTimeout(fetchLaunch, interval);
                        isFetching = false;
                        updateMetaInfo();
                    } )
                    .catch(function(e) {
                        var retryDelay = 30000;
                        var errorMsg = t.errorTry;
                        
                        if (e && e.isRateLimit && e.detail) {
                            var match = e.detail.match(/available in (\d+)/);
                            if (match && match[1]) {
                                retryDelay = (parseInt(match[1], 10) + 5) * 1000;
                            }
                            errorMsg = t.errorRateLimit || "Rate limit exceeded. We will try again later.";
                        }
                        
                        var cachedObj = readCache();
                        if (cachedObj && cachedObj.data) {
                            renderData(cachedObj.data);
                            window.spaceWidgetNextRefreshTime = new Date().getTime() + retryDelay;
                            window.spaceWidgetFetchTimeout = setTimeout(fetchLaunch, retryDelay);
                            isFetching = false;
                            updateMetaInfo();
                            return;
                        }
                        
                        titleEl.textContent = t.errorLoad;
                        nameEl.textContent = errorMsg;
                        nameEl.removeAttribute('href');
                        providerPadEl.style.display = 'none';
                        avatarEl.style.display = 'none';
                        timerEl.style.display = 'none';
                        coarseDateEl.style.display = 'none';
                        statusEl.style.display = 'none';
                        if (refreshBtnEl) {
                            refreshBtnEl.style.display = 'inline-flex';
                        }
                        warningBoxEl.style.display = 'none';
                        window.spaceWidgetNextRefreshTime = new Date().getTime() + retryDelay;
                        window.spaceWidgetFetchTimeout = setTimeout(fetchLaunch, retryDelay);
                        isFetching = false;
                        updateMetaInfo();
                    } );
            }

            function renderData(data) {
                var now = new Date().getTime();
                matchedLaunches = [];
                if (data && data.results && data.results.length !== undefined) {
                    for (var i = 0; i < data.results.length; i++) {
                        var l = data.results[i];
                        var r = '';
                        var families = [];
                        if (l.rocket && l.rocket.configuration) {
                            r = (l.rocket.configuration.name || '').toLowerCase();
                            if (l.rocket.configuration.families) {
                                for (var k = 0; k < l.rocket.configuration.families.length; k++) {
                                    families.push((l.rocket.configuration.families[k].name || '').toLowerCase());
                                }
                            }
                        }

                        var isAllowed = ALLOWED_ROCKETS.length === 0;
                        for (var j = 0; j < ALLOWED_ROCKETS.length; j++) {
                            var allowed = ALLOWED_ROCKETS[j];
                            if (r.indexOf(allowed) !== -1) {
                                isAllowed = true;
                                break;
                            }
                            for (var k = 0; k < families.length; k++) {
                                if (families[k].indexOf(allowed) !== -1) {
                                    isAllowed = true;
                                    break;
                                }
                            }
                            if (isAllowed) break;
                        }

                        var launchTime = new Date(l.net).getTime();
                        var daysAway = (launchTime - now) / (1000 * 60 * 60 * 24);

                        var isFuture = launchTime > now;
                        var isSoon = daysAway <= MAX_DAYS;

                        if (isAllowed && isFuture && isSoon) {
                            matchedLaunches.push(l);
                            if (matchedLaunches.length === 5) {
                                break;
                            }
                        }
                    }
                }

                var storedLaunchId = null;
                try {
                    storedLaunchId = localStorage.getItem(SELECTED_LAUNCH_KEY);
                } catch (ex) {}

                currentSelectedIndex = 0;
                if (storedLaunchId && matchedLaunches.length > 0) {
                    for (var idx = 0; idx < matchedLaunches.length; idx++) {
                        if (matchedLaunches[idx].id === storedLaunchId) {
                            var lTime = new Date(matchedLaunches[idx].net).getTime();
                            if (lTime > now) {
                                currentSelectedIndex = idx;
                            } else {
                                try {
                                    localStorage.removeItem(SELECTED_LAUNCH_KEY);
                                } catch (ex) {}
                            }
                            break;
                        }
                    }
                }

                return showLaunch(currentSelectedIndex);
            }

            function showLaunch(index) {
                var launch = (matchedLaunches.length > 0) ? matchedLaunches[index] : null;
                var now = new Date().getTime();
                if (launch) {
                    titleEl.textContent = t.upcoming;
                    nameEl.textContent = launch.name;
                    if (launch.slug && typeof launch.slug === 'string') {
                        nameEl.href = 'https://spacelaunchnow.me/launch/' + encodeURIComponent(launch.slug);
                    } else {
                        nameEl.removeAttribute('href');
                    }

                    var provider = (launch.launch_service_provider && launch.launch_service_provider.name) ? String(launch.launch_service_provider.name) : '';
                    var padName = (launch.pad && launch.pad.name) ? String(launch.pad.name) : '';
                    var locName = (launch.pad && launch.pad.location && launch.pad.location.name) ? String(launch.pad.location.name) : '';

                    var padStr = padName;
                    if (locName && padName.indexOf(locName) === -1) {
                        padStr += ', ' + locName;
                    }
                    var provPadText = '';
                    if (provider && padStr) {
                        provPadText = provider + ' • ' + padStr;
                    } else if (provider) {
                        provPadText = provider;
                    } else if (padStr) {
                        provPadText = padStr;
                    }

                    if (provPadText) {
                        providerPadEl.textContent = provPadText;
                        providerPadEl.style.display = 'block';
                    } else {
                        providerPadEl.style.display = 'none';
                    }

                    if (localTimeEl) {
                        var localTimeStr = '';
                        if (launch.net) {
                            try {
                                var localDate = new Date(launch.net);
                                var options = {
                                     day: 'numeric',
                                     month: 'short',
                                     year: 'numeric',
                                     hour: '2-digit',
                                     minute: '2-digit',
                                     timeZoneName: 'short'
                                 };
                                localTimeStr = localDate.toLocaleString(langCode, options);
                            } catch (ex) {
                                localTimeStr = String(launch.net);
                            }
                        }
                        if (localTimeStr) {
                            localTimeEl.textContent = localTimeStr;
                            localTimeEl.style.display = 'block';
                        } else {
                            localTimeEl.style.display = 'none';
                        }
                    }

                    var statusMap = {
                        'Go for Launch': t.statusReady,
                        'To Be Determined': t.statusTbd,
                        'Launch Successful': t.statusSuccess,
                        'TBC': t.statusTbc,
                        'In Flight': t.statusInFlight,
                        'Hold': t.statusHold,
                        'Launch Pending': t.statusPending,
                        'Postponed': t.statusPostponed,
                        'Suspended': t.statusSuspended,
                        'Cancelled': t.statusCancelled
                    };

                    var rawStatus = (launch.status && launch.status.name) ? launch.status.name : '';
                    var statusText = statusMap[rawStatus] || rawStatus || t.statusUnknown;
                    if (launch.probability !== null && launch.probability !== undefined && launch.probability > 0) {
                        statusText += ' (' + launch.probability + '% ' + t.weather + ')';
                    }
                    statusEl.textContent = statusText;

                    var statusName = rawStatus.toLowerCase();
                    if (statusName.indexOf('cancel') !== -1 || statusName.indexOf('fail') !== -1) {
                        statusEl.style.background = 'rgba(239, 68, 68, 0.15)';
                        statusEl.style.color = '#f87171';
                        statusEl.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                    } else if (statusName.indexOf('go') !== -1 || statusName.indexOf('success') !== -1 || statusName.indexOf('flight') !== -1) {
                        statusEl.style.background = 'rgba(16, 185, 129, 0.15)';
                        statusEl.style.color = '#34d399';
                        statusEl.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                    } else {
                        statusEl.style.background = 'rgba(245, 158, 11, 0.15)';
                        statusEl.style.color = '#fbbf24';
                        statusEl.style.borderColor = 'rgba(245, 158, 11, 0.3)';
                    }

                    if (launch.image && (launch.image.thumbnail_url || launch.image.image_url)) {
                        avatarEl.src = encodeURI(String(launch.image.thumbnail_url || launch.image.image_url) );
                        avatarEl.style.display = 'block';
                    } else {
                        avatarEl.style.display = 'none';
                    }

                    var warningText = '';
                    var lang = langCode || 'en';
                    var failLabel = i18n[lang].failReason || i18n['en'].failReason || 'Failure Reason: ';
                    var weatherLabel = i18n[lang].weatherConcern || i18n['en'].weatherConcern || 'Weather Concern: ';

                    if (launch.failreason) {
                        warningText = failLabel + launch.failreason;
                    } else if (launch.weather_concerns) {
                        warningText = weatherLabel + launch.weather_concerns;
                    }

                    if (warningText) {
                        warningBoxEl.textContent = warningText;
                        warningBoxEl.style.display = 'block';
                    } else {
                        warningBoxEl.style.display = 'none';
                    }

                    var precisionId = (launch.net_precision && launch.net_precision.id) || 5;
                    var isPrecise = (precisionId <= 6);

                    statusEl.style.display = 'inline-block';
                    if (refreshBtnEl) {
                        refreshBtnEl.style.display = 'inline-flex';
                    }

                    if (isPrecise) {
                        timerEl.style.display = 'flex';
                        coarseDateEl.style.display = 'none';
                        targetDate = new Date(launch.net).getTime();
                        updateTimer();
                        if (window.spaceWidgetTimerInterval) {
                            clearInterval(window.spaceWidgetTimerInterval);
                        }
                        window.spaceWidgetTimerInterval = setInterval(updateTimer, 1000);
                    } else {
                        timerEl.style.display = 'none';
                        coarseDateEl.style.display = 'block';
                        coarseDateEl.textContent = formatCoarseDate(launch.net, precisionId);
                        if (window.spaceWidgetTimerInterval) {
                            clearInterval(window.spaceWidgetTimerInterval);
                        }
                    }
                } else {
                    titleEl.textContent = t.noneScheduled;
                    nameEl.textContent = t.checkLater;
                    nameEl.removeAttribute('href');
                    providerPadEl.style.display = 'none';
                    if (localTimeEl) {
                        localTimeEl.style.display = 'none';
                    }
                    avatarEl.style.display = 'none';
                    timerEl.style.display = 'none';
                    coarseDateEl.style.display = 'none';
                    statusEl.style.display = 'none';
                    if (refreshBtnEl) {
                        refreshBtnEl.style.display = 'inline-flex';
                    }
                    warningBoxEl.style.display = 'none';
                    if (window.spaceWidgetTimerInterval) {
                        clearInterval(window.spaceWidgetTimerInterval);
                    }
                }

                if (navControlsEl) {
                    if (matchedLaunches.length > 1) {
                        navControlsEl.style.display = 'inline-flex';
                        if (navIndexEl) {
                            navIndexEl.textContent = (index + 1) + '/' + matchedLaunches.length;
                        }
                    } else {
                        navControlsEl.style.display = 'none';
                    }
                }

                return launch;
            }

            function updateTimer() {
                var now = new Date().getTime();
                var dist = targetDate - now;
                var isCountUp = dist < 0;
                
                var absSecs = isCountUp 
                    ? Math.floor(Math.abs(dist) / 1000) 
                    : Math.ceil(dist / 1000);
                
                var d = Math.floor(absSecs / 86400);
                var h = Math.floor((absSecs % 86400) / 3600);
                var m = Math.floor((absSecs % 3600) / 60);
                var s = absSecs % 60;
                
                dEl.textContent = (d < 10 ? '0' : '') + d;
                hEl.textContent = (h < 10 ? '0' : '') + h;
                mEl.textContent = (m < 10 ? '0' : '') + m;
                sEl.textContent = (s < 10 ? '0' : '') + s;

                if (isCountUp) {
                    signEl.textContent = 'T+';
                    signEl.style.color = '#34d399';
                    if (absSecs % 2 === 0) {
                        signBoxEl.style.backgroundColor = 'rgba(52, 211, 153, 0.2)';
                        signBoxEl.style.borderColor = 'rgba(52, 211, 153, 0.6)';
                        signBoxEl.style.boxShadow = '0 0 10px rgba(52, 211, 153, 0.4)';
                    } else {
                        signBoxEl.style.backgroundColor = 'rgba(52, 211, 153, 0.05)';
                        signBoxEl.style.borderColor = 'rgba(52, 211, 153, 0.2)';
                        signBoxEl.style.boxShadow = 'none';
                    }
                } else {
                    signEl.textContent = 'T-';
                    signEl.style.color = '#a5b4fc';
                    signBoxEl.style.backgroundColor = 'rgba(165, 180, 252, 0.05)';
                    signBoxEl.style.borderColor = 'rgba(165, 180, 252, 0.15)';
                    signBoxEl.style.boxShadow = 'none';
                }
            }

            /* Cache-first initialization: render from cache if within TTL, then fetch */
            var initCache = readCache();
            if (initCache && initCache.data) {
                window.spaceWidgetLastFetchTime = initCache.ts;
                window.spaceWidgetCurrentThrottle = initCache.throttle;

                var matchedLaunch = renderData(initCache.data);
                var now = new Date().getTime();
                var age = now - (initCache.ts || 0);
                var ttl = getDynamicTTL(matchedLaunch, initCache.throttle);
                
                var hasFuture = false;
                if (initCache.data.results && initCache.data.results.length > 0) {
                    for (var i = 0; i < initCache.data.results.length; i++) {
                        if (new Date(initCache.data.results[i].net).getTime() > now) {
                            hasFuture = true;
                            break;
                        }
                    }
                }
                
                if (age >= ttl || !hasFuture) {
                    window.spaceWidgetNextRefreshTime = now;
                    fetchLaunch();
                } else {
                    var remaining = ttl - age;
                    window.spaceWidgetNextRefreshTime = now + (remaining > 1000 ? remaining : 1000);
                    if (window.spaceWidgetFetchTimeout) {
                        clearTimeout(window.spaceWidgetFetchTimeout);
                    }
                    window.spaceWidgetFetchTimeout = setTimeout(fetchLaunch, remaining > 1000 ? remaining : 1000);
                    updateMetaInfo();
                }
            } else {
                fetchLaunch();
            }
        } )();
    </script>
</div>
