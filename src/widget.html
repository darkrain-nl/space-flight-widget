<div id="space-countdown-widget" data-lang="en" style="font-family: 'Inter', system-ui, sans-serif; background: rgba(15, 17, 26, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 1.5rem; color: white; max-width: 350px; width: 100%; text-align: center; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); box-sizing: border-box; margin: auto;">
    <div id="space-title" style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.8rem; font-weight: 600;">Loading...</div>
    <div id="space-name" style="font-weight: 700; font-size: 1.1rem; margin-bottom: 1.2rem; line-height: 1.3; background: linear-gradient(to right, #fff, #a5b4fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">--</div>

    <div id="space-timer" style="display: none; justify-content: center; gap: 12px; margin-bottom: 1rem;">
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 8px; min-width: 50px;">
            <span id="space-d" style="font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px;">00</span>
            <span id="space-lbl-d" style="font-size: 0.65rem; color: #94a3b8; letter-spacing: 0.5px;">DAYS</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 8px; min-width: 50px;">
            <span id="space-h" style="font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px;">00</span>
            <span id="space-lbl-h" style="font-size: 0.65rem; color: #94a3b8; letter-spacing: 0.5px;">HOURS</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 8px; min-width: 50px;">
            <span id="space-m" style="font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px;">00</span>
            <span id="space-lbl-m" style="font-size: 0.65rem; color: #94a3b8; letter-spacing: 0.5px;">MINS</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 8px; min-width: 50px;">
            <span id="space-s" style="font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px;">00</span>
            <span id="space-lbl-s" style="font-size: 0.65rem; color: #94a3b8; letter-spacing: 0.5px;">SECS</span>
        </div>
    </div>

    <div id="space-status" style="display: none; font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3);">--</div>

    <div id="space-attribution" style="margin-top: 1.5rem; font-size: 0.65rem;">
        <a id="space-attr-link" href="https://thespacedevs.com/" target="_blank" rel="noopener noreferrer" style="color: #94a3b8; text-decoration: none;">Data by The Space Devs</a>
    </div>

    <script>
        (function () {
            var API_URL = 'https://ll.thespacedevs.com/2.3.0/launches/upcoming/?limit=50';
            var widgetEl = document.getElementById('space-countdown-widget');
            var langCode = (widgetEl.getAttribute('data-lang') || 'en').toLowerCase();
            var dataRockets = widgetEl.getAttribute('data-rockets');
            var ALLOWED_ROCKETS = dataRockets !== null 
                ? dataRockets.split(',').map(function(r) { return r.trim().toLowerCase(); } ).filter(function(r) { return r.length > 0; } ) 
                : ['starship', 'super heavy', 'falcon heavy', 'sls', 'vulcan', 'new glenn', 'ariane 6', 'long march 5', 'angara a5', 'proton'];

            var i18n = {
                en: { loading: "Loading...", days: "DAYS", hours: "HOURS", mins: "MINS", secs: "SECS", upcoming: "Upcoming Launch", statusReady: "Go for Launch", statusTbd: "To Be Determined", statusSuccess: "Launch Successful", statusTbc: "TBC", statusInFlight: "In Flight", statusUnknown: "Unknown Status", noneScheduled: "No Launch Scheduled", checkLater: "Check back later", errorLoad: "Error loading data", errorTry: "Try again later", attribution: "Data by The Space Devs" },
                fr: { loading: "Chargement...", days: "JOURS", hours: "HEURES", mins: "MIN", secs: "SEC", upcoming: "Lancement à venir", statusReady: "Prêt pour le lancement", statusTbd: "À déterminer", statusSuccess: "Lancement réussi", statusTbc: "À confirmer", statusInFlight: "En vol", statusUnknown: "Statut inconnu", noneScheduled: "Aucun lancement prévu", checkLater: "Revenez plus tard", errorLoad: "Erreur de chargement", errorTry: "Réessayez plus tard", attribution: "Données par The Space Devs" },
                it: { loading: "Caricamento...", days: "GIORNI", hours: "ORE", mins: "MIN", secs: "SEC", upcoming: "Lancio imminente", statusReady: "Pronto al lancio", statusTbd: "Da definire", statusSuccess: "Lancio riuscito", statusTbc: "Da confermare", statusInFlight: "In volo", statusUnknown: "Stato sconosciuto", noneScheduled: "Nessun lancio programmato", checkLater: "Riprova più tardi", errorLoad: "Errore di caricamento", errorTry: "Riprova più tardi", attribution: "Dati di The Space Devs" },
                de: { loading: "Laden...", days: "TAGE", hours: "STD", mins: "MIN", secs: "SEK", upcoming: "Bevorstehender Start", statusReady: "Bereit zum Start", statusTbd: "Noch zu bestimmen", statusSuccess: "Start erfolgreich", statusTbc: "Zu bestätigen", statusInFlight: "Im Flug", statusUnknown: "Unbekannter Status", noneScheduled: "Kein Start geplant", checkLater: "Schauen Sie später wieder vorbei", errorLoad: "Fehler beim Laden", errorTry: "Später erneut versuchen", attribution: "Daten von The Space Devs" },
                es: { loading: "Cargando...", days: "DÍAS", hours: "HORAS", mins: "MIN", secs: "SEG", upcoming: "Próximo Lanzamiento", statusReady: "Listo para el lanzamiento", statusTbd: "Por determinar", statusSuccess: "Lanzamiento exitoso", statusTbc: "Por confirmar", statusInFlight: "En vuelo", statusUnknown: "Estado desconocido", noneScheduled: "Ningún lanzamiento programado", checkLater: "Vuelve más tarde", errorLoad: "Error al cargar los datos", errorTry: "Inténtalo de nuevo más tarde", attribution: "Datos de The Space Devs" },
                nl: { loading: "Laden...", days: "DAGEN", hours: "UUR", mins: "MIN", secs: "SEC", upcoming: "Aankomende Lancering", statusReady: "Klaar voor Lancering", statusTbd: "Nog te bepalen", statusSuccess: "Lancering Succesvol", statusTbc: "Nog te bevestigen", statusInFlight: "In de Vlucht", statusUnknown: "Onbekende Status", noneScheduled: "Geen Lancering Gepland", checkLater: "Kijk later nog eens", errorLoad: "Fout bij laden van gegevens", errorTry: "Probeer het later opnieuw", attribution: "Gegevens via The Space Devs" }
            };

            var t = i18n[langCode] || i18n['en'];

            var titleEl = document.getElementById('space-title');
            var nameEl = document.getElementById('space-name');
            var statusEl = document.getElementById('space-status');
            var timerEl = document.getElementById('space-timer');
            var dEl = document.getElementById('space-d');
            var hEl = document.getElementById('space-h');
            var mEl = document.getElementById('space-m');
            var sEl = document.getElementById('space-s');
            
            var lblDEl = document.getElementById('space-lbl-d');
            var lblHEl = document.getElementById('space-lbl-h');
            var lblMEl = document.getElementById('space-lbl-m');
            var lblSEl = document.getElementById('space-lbl-s');
            var attrLinkEl = document.getElementById('space-attr-link');

            titleEl.textContent = t.loading;
            lblDEl.textContent = t.days;
            lblHEl.textContent = t.hours;
            lblMEl.textContent = t.mins;
            lblSEl.textContent = t.secs;
            attrLinkEl.textContent = t.attribution;

            var targetDate;
            var timerInterval;

            function fetchLaunch() {
                clearInterval(timerInterval);
                fetch(API_URL)
                    .then(function(res) {
                        if (!res.ok) throw new Error('API error');
                        return res.json();
                    } )
                    .then(function(data) {
                        var launch = null;
                        var now = new Date().getTime();
                        for (var i = 0; i < data.results.length; i++) {
                            var l = data.results[i];
                            var r = '';
                            var f = '';
                            if (l.rocket && l.rocket.configuration) {
                                r = (l.rocket.configuration.name || '').toLowerCase();
                                f = (l.rocket.configuration.family || '').toLowerCase();
                            }
                            
                            var isAllowed = ALLOWED_ROCKETS.length === 0;
                            for (var j = 0; j < ALLOWED_ROCKETS.length; j++) {
                                if (r.indexOf(ALLOWED_ROCKETS[j]) !== -1 || f.indexOf(ALLOWED_ROCKETS[j]) !== -1) {
                                    isAllowed = true;
                                    break;
                                }
                            }
                            
                            var launchTime = new Date(l.net).getTime();
                            var daysAway = (launchTime - now) / (1000 * 60 * 60 * 24);
                            
                            var isFuture = launchTime > now;
                            var isSoon = daysAway <= 7;
                            
                            if (isAllowed && isFuture && isSoon) {
                                launch = l;
                                break;
                            }
                        }

                        if (launch) {
                            titleEl.textContent = t.upcoming;
                            nameEl.textContent = launch.name;
                            
                            var statusMap = {
                                'Go for Launch': t.statusReady,
                                'To Be Determined': t.statusTbd,
                                'Launch Successful': t.statusSuccess,
                                'TBC': t.statusTbc,
                                'In Flight': t.statusInFlight
                            };
                            
                            var rawStatus = (launch.status && launch.status.name) ? launch.status.name : '';
                            statusEl.textContent = statusMap[rawStatus] || rawStatus || t.statusUnknown;

                            var statusName = rawStatus.toLowerCase();
                            if (statusName.indexOf('go') === -1 && statusName.indexOf('success') === -1) {
                                statusEl.style.background = 'rgba(245, 158, 11, 0.15)';
                                statusEl.style.color = '#fbbf24';
                                statusEl.style.borderColor = 'rgba(245, 158, 11, 0.3)';
                            }

                            targetDate = new Date(launch.net).getTime();
                            timerEl.style.display = 'flex';
                            statusEl.style.display = 'inline-block';

                            updateTimer();
                            timerInterval = setInterval(updateTimer, 1000);
                        } else {
                            titleEl.textContent = t.noneScheduled;
                            nameEl.textContent = t.checkLater;
                            timerEl.style.display = 'none';
                            statusEl.style.display = 'none';
                        }
                        setTimeout(fetchLaunch, 300000);
                    } )
                    .catch(function(e) {
                        titleEl.textContent = t.errorLoad;
                        nameEl.textContent = t.errorTry;
                        setTimeout(fetchLaunch, 30000);
                    } );
            }

            function updateTimer() {
                var dist = targetDate - new Date().getTime();
                if (dist < 0) {
                    clearInterval(timerInterval);
                    return;
                }
                var d = Math.floor(dist / 86400000);
                var h = Math.floor((dist % 86400000) / 3600000);
                var m = Math.floor((dist % 3600000) / 60000);
                var s = Math.floor((dist % 60000) / 1000);
                
                dEl.textContent = (d < 10 ? '0' : '') + d;
                hEl.textContent = (h < 10 ? '0' : '') + h;
                mEl.textContent = (m < 10 ? '0' : '') + m;
                sEl.textContent = (s < 10 ? '0' : '') + s;
            }

            fetchLaunch();
        } )();
    </script>
</div>
